name: Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**.sol'
      - '**.yml'
      - '**.toml'
      - 'lib/**'
      - '.gitmodules'
  push:
    branches:
      - main
    paths:
      - '**.sol'
      - '**.yml'
      - '**.toml'
      - 'lib/**'
      - '.gitmodules'

env:
  FOUNDRY_PROFILE: ci

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        profile: [solc-0.7.6,default]

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      - id: yarn-cache
        run: echo "dir=$(yarn cache dir)"  >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-
      - run: yarn --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: v1.3.5

      - name: Run Forge build with ${{ matrix.profile }}
        # We always build with 0.7.6 to ensure that the project is compatible with the oldest version
        run: |
          forge --version
          if [ "${{ matrix.profile }}" == "solc-0.7.6" ]; then
            FOUNDRY_PROFILE=ci forge build --sizes --use 0.7.6 --skip 'test/*' --skip 'script/*'
          else
            FOUNDRY_PROFILE=ci forge build --sizes
          fi
        id: build

      - name: Run Forge tests
        if: matrix.profile != 'solc-0.7.6'
        run: |
          FOUNDRY_PROFILE=ci forge test -vvv
        id: test

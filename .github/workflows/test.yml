name: Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**.sol'
      - '**.yml'
      - '**.toml'
      - 'lib/**'
      - '.gitmodules'
  push:
    branches:
      - main
    paths:
      - '**.sol'
      - '**.yml'
      - '**.toml'
      - 'lib/**'
      - '.gitmodules'

env:
  FOUNDRY_PROFILE: ci

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        profile: [solc-0.7.6,default]

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      - id: yarn-cache
        run: echo "dir=$(yarn cache dir)"  >> "$GITHUB_OUTPUT"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-
      - run: yarn --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: v1.3.5

      - name: Run Forge build with ${{ matrix.profile }}
        # We always build with 0.7.6 to ensure that the project is compatible with the oldest version
        run: |
          forge --version
          if [ "${{ matrix.profile }}" == "solc-0.7.6" ]; then
            FOUNDRY_PROFILE=ci forge build --sizes --use 0.7.6 --skip 'test/*' --skip 'script/*'
          else
            FOUNDRY_PROFILE=ci forge build --sizes
          fi
        id: build

      - name: Run Forge tests
        if: matrix.profile != 'solc-0.7.6'
        run: |
          FOUNDRY_PROFILE=ci forge test -vvv
        id: test
